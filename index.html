cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'DM Sans',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.player{width:480px;padding:40px}
.title{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;letter-spacing:.3em;color:#555;text-transform:uppercase;margin-bottom:48px;text-align:center}
.controls{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:40px}
.btn-skip{background:none;border:none;cursor:pointer;color:#555;display:flex;align-items:center;transition:color .2s;padding:8px}
.btn-skip:hover{color:#e0e0e0}
.btn-skip svg{width:22px;height:22px}
.btn-play{width:56px;height:56px;border-radius:50%;background:#e0e0e0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s}
.btn-play:hover{background:#fff}
.btn-play:active{transform:scale(.96)}
.btn-play svg{width:22px;height:22px;fill:#0a0a0a}
.progress-area{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.time{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;color:#555;min-width:32px}
.time.right{text-align:right}
.track{flex:1;height:3px;background:#222;border-radius:2px;position:relative;cursor:pointer}
.track-fill{height:100%;background:#e0e0e0;border-radius:2px;width:0%;pointer-events:none}
.track-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:#e0e0e0;border-radius:50%;left:0%;pointer-events:none;transition:transform .1s}
.track:hover .track-thumb{transform:translate(-50%,-50%) scale(1.3)}
.volume-area{display:flex;align-items:center;gap:12px}
.volume-icon{color:#555;display:flex;align-items:center}
.volume-icon svg{width:16px;height:16px}
.volume-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:#222;border-radius:2px;outline:none;cursor:pointer}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#e0e0e0;border-radius:50%;cursor:pointer}
</style>
</head>
<body>
<div class="player">
<div class="title">FRAX</div>
<div class="controls">
<button class="btn-skip" id="back">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5V2L7 7l5 5V9c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="5.5" fill="currentColor" stroke="none">3</text></svg>
</button>
<button class="btn-play" id="play">
<svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>
<button class="btn-skip" id="forward">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5V2l5 5-5 5V9c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="5.5" fill="currentColor" stroke="none">3</text></svg>
</button>
</div>
<div class="progress-area">
<span class="time" id="current">0:00</span>
<div class="track" id="track">
<div class="track-fill" id="fill"></div>
<div class="track-thumb" id="thumb"></div>
</div>
<span class="time right" id="total">1:31</span>
</div>
<div class="volume-area">
<span class="volume-icon">
<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
</span>
<input class="volume-slider" id="volume" type="range" min="0" max="100" value="80">
<span class="volume-icon">
<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</span>
</div>
</div>
<script src="https://unpkg.com/tone"></script>
<script src="player.js"></script>
</body>
</html>
EOF
